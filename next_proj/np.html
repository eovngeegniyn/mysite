<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>@by Onegin</title>
        <link rel="icon" href="img/atyan.svg"> 
        <link rel="stylesheet" href="../style.css">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="format-detection" content="telephone=no">
        <meta name="format-detection" content="date=no">
        <meta name="format-detection" content="address=no">
        <meta name="format-detection" content="email=no">
        <meta name="description" content="">
    </head>

    <body>
        <div id="app">
            <header class="header">
                    <div class="container header__wrap">

                        <a href="../index.html" class="header__logo">
                            <h1 class="text_title">Onegin</h1>
                            <!--<img id="icon" src="img/atyan2.svg" alt="лого-домой">  -->
                        </a>
                        
                        <input type="text" placeholder="Поиск">

                    </div>
             </header>           

             <main class="main">
                <div class="container wrapper">

                    <h2>Содержимое файла:</h2>
                    <pre id="output">Загрузка...</pre>
                    
                    <div id="output"></div>

                    <script>
                    fetch('main.php')
                    .then(res => res.json())
                    .then(data => {
                        let html = '';

                        data.forEach(match => {
                        html += `
                            <div style="margin-bottom:20px;">
                            <b>${match[0]} vs ${match[1]}</b><br>
                            Время: ${match[3]}<br>
                            P1: ${match[4].P1} | X: ${match[4].X} | P2: ${match[4].P2}
                            </div>
                        `;
                        });

                        document.getElementById('output').innerHTML = html;
                    })
                    .catch(err => {
                        document.getElementById('output').textContent = "Ошибка загрузки";
                        console.error("Ошибка:", err);
                    });
                    </script>

                </div>
             </main>
        </div>

        <footer class="footer">
            <div class="footer__wrap">
                <div class="container footer__wrap">
                    
                    <h2 class="footer__content">My contacts</h2>
                    <ul class="footer__list">
                        <li><a href="mailto:eovngeegniyn@gmail.com" target="_blank">Gmail</a></li>
                        <li><a href="tg://resolve?domain=eovngeegniyn" target="_blank">Telegram</a></li>
                        <li><a href="https://vk.com/eovngeegniyn" target="_blank">VK</a></li>
                    </ul>
                   
                </div>
            </div>
        </footer>

    </body>
</html>
